<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teacher Dashboard - Online Safety and Privacy</title>
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="summaries.js" defer></script>
</head>
<body class="auth-required">
  <header class="hero">
    <h1>Teacher Dashboard</h1>
    <p>Online Safety and Privacy Case Studies</p>
  </header>

  <main>
    <section class="teacher-note auth-bar" id="authBar">Checking teacher sign in...</section>
    <section class="teacher-note no-print">
      <h2>Teacher Display Page</h2>
      <p>This page displays every group response submitted from the Case Studies activity.</p>
      <div class="button-row">
        <button id="reloadResponsesButton" type="button">Reload responses</button>
        <a class="button secondary" href="case-studies.html">Back to Case Studies</a>
        <p id="dashboardStatus" class="status-message">Loading dashboard...</p>
      </div>
    </section>

    <section id="summaryContainer" class="summary-container">
      <p class="empty-message">Loading group responses...</p>
    </section>
  </main>
</body>
</html>
